name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: |
          bun run build:darwin-arm64
          bun run build:darwin-x64
          bun run build:linux-x64
          bun run build:linux-arm64

      - name: Smoke test (linux-x64)
        run: ./dist/dex-linux-x64 --help

      - name: Generate checksums
        working-directory: dist
        run: sha256sum dex-* > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/dex-darwin-arm64
            dist/dex-darwin-x64
            dist/dex-linux-x64
            dist/dex-linux-arm64
            dist/SHA256SUMS.txt

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    if: ${{ vars.HOMEBREW_TAP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: aaorlov/homebrew-dex
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern SHA256SUMS.txt \
            --dir dist

      - name: Render formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/${REPO}/releases/download/${TAG}"
          sha() { awk -v f="$1" '$2==f {print $1}' dist/SHA256SUMS.txt; }
          sha_darwin_arm64=$(sha dex-darwin-arm64)
          sha_darwin_x64=$(sha dex-darwin-x64)
          sha_linux_arm64=$(sha dex-linux-arm64)
          sha_linux_x64=$(sha dex-linux-x64)

          mkdir -p tap/Formula
          cat > tap/Formula/dex.rb <<EOF
          class Dex < Formula
            desc "Bun-native CLI for AWS, Kubernetes, and GitLab CI/CD workflows"
            homepage "https://github.com/${REPO}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/dex-darwin-arm64"
                sha256 "${sha_darwin_arm64}"
              end
              on_intel do
                url "${base}/dex-darwin-x64"
                sha256 "${sha_darwin_x64}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/dex-linux-arm64"
                sha256 "${sha_linux_arm64}"
              end
              on_intel do
                url "${base}/dex-linux-x64"
                sha256 "${sha_linux_x64}"
              end
            end

            def install
              binary =
                if OS.mac? && Hardware::CPU.arm?      then "dex-darwin-arm64"
                elsif OS.mac?                          then "dex-darwin-x64"
                elsif OS.linux? && Hardware::CPU.arm?  then "dex-linux-arm64"
                else                                        "dex-linux-x64"
                end
              bin.install binary => "dex"
            end

            test do
              assert_match "Usage", shell_output("#{bin}/dex --help")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dex.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "dex ${TAG}"
            git push
          fi
